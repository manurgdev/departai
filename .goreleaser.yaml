# GoReleaser config — https://goreleaser.com
# Build/check locally with:  go run github.com/goreleaser/goreleaser/v2@latest check
# Dry-run a release with:     go run github.com/goreleaser/goreleaser/v2@latest release --snapshot --clean
version: 2

project_name: departai

before:
  hooks:
    - go mod tidy

builds:
  - id: departai
    main: .
    binary: departai
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Inject version info into internal/version via ldflags (matches the
    # variables there; -s -w strips debug info for smaller binaries).
    ldflags:
      - -s -w
      - -X github.com/manurgdev/departai/internal/version.Version={{ .Version }}
      - -X github.com/manurgdev/departai/internal/version.Commit={{ .FullCommit }}
      - -X github.com/manurgdev/departai/internal/version.Date={{ .Date }}

archives:
  - id: departai
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - ROADMAP.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
