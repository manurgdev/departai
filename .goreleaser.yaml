# GoReleaser config — https://goreleaser.com
# Build/check locally with:  go run github.com/goreleaser/goreleaser/v2@latest check
# Dry-run a release with:     go run github.com/goreleaser/goreleaser/v2@latest release --snapshot --clean
version: 2

project_name: departai

before:
  hooks:
    - go mod tidy
    # Generate shell completions from the `completion` subcommand (no backend
    # CLI needed, so this runs in CI). Wrapped in sh -c for the redirect.
    - mkdir -p completions
    - sh -c "go run . completion bash > completions/departai.bash"
    - sh -c "go run . completion zsh > completions/departai.zsh"
    - sh -c "go run . completion fish > completions/departai.fish"

builds:
  - id: departai
    main: .
    binary: departai
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Inject version info into internal/version via ldflags (matches the
    # variables there; -s -w strips debug info for smaller binaries).
    ldflags:
      - -s -w
      - -X github.com/manurgdev/departai/internal/version.Version={{ .Version }}
      - -X github.com/manurgdev/departai/internal/version.Commit={{ .FullCommit }}
      - -X github.com/manurgdev/departai/internal/version.Date={{ .Date }}

archives:
  - id: departai
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - ROADMAP.md
      - completions/*
      - man/departai.1

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

homebrew_casks:
  - name: departai
    binaries:
      - departai
    repository:
      owner: manurgdev
      name: homebrew-departai
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/manurgdev/departai"
    description: "Orchestrate two AI coding agents in a deterministic, sequential relay"
    license: "MIT"
    completions:
      bash: completions/departai.bash
      zsh: completions/departai.zsh
      fish: completions/departai.fish
    manpages:
      - man/departai.1
    # The released binaries are unsigned; strip the Gatekeeper quarantine
    # attribute on install so macOS doesn't block the binary.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/departai"]
          end

release:
  draft: false
  prerelease: auto
